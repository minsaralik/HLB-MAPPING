<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HLB Field Mapper — Satellite</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root{
    --bg:#16211d; --bg-raised:#1e2d27; --paper:#eae6d9; --amber:#e8a23d; --amber-dim:#7a5a26;
    --teal:#5fa895; --danger:#c0563f; --text:#eae6d9; --text-dim:#93a39a; --border:#33473d;
    --font-display:'Space Grotesk',sans-serif; --font-mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; height:100%; background:var(--bg); color:var(--text); font-family:var(--font-display); overscroll-behavior:none;}
  body{display:flex; flex-direction:column; height:100vh; height:100dvh;}

  header{padding:10px 14px 8px; border-bottom:1px solid var(--border); background:linear-gradient(180deg,var(--bg-raised),var(--bg)); flex-shrink:0; z-index:10; position:relative;}
  .brand{display:flex; align-items:baseline; justify-content:space-between; gap:8px;}
  .brand h1{font-size:15px; font-weight:700; letter-spacing:0.02em; margin:0; text-transform:uppercase;}
  .brand h1 span{color:var(--amber);}
  .brand .tagline{font-family:var(--font-mono); font-size:9px; color:var(--text-dim); letter-spacing:0.08em;}
  .blockrow{display:flex; gap:6px; margin-top:8px; align-items:center;}
  .blockrow label{font-family:var(--font-mono); font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.05em; flex-shrink:0;}
  .blockrow input{flex:1; background:var(--bg); border:1px solid var(--border); color:var(--amber); font-family:var(--font-mono); font-size:13px; padding:6px 8px; border-radius:3px; min-width:0;}
  .blockrow input:focus{outline:none; border-color:var(--amber);}

  .gpsbar{display:flex; gap:10px; padding:8px 14px; background:var(--bg-raised); border-bottom:1px solid var(--border); font-family:var(--font-mono); font-size:10.5px; flex-shrink:0; overflow-x:auto; white-space:nowrap; z-index:10; position:relative;}
  .gpsbar .stat{display:flex; flex-direction:column; gap:1px; min-width:58px;}
  .gpsbar .stat .k{color:var(--text-dim); font-size:8.5px; text-transform:uppercase; letter-spacing:0.06em;}
  .gpsbar .stat .v{color:var(--paper); font-weight:500;}
  .dot{width:7px; height:7px; border-radius:50%; display:inline-block; margin-right:5px; flex-shrink:0;}
  .dot.acquiring{background:var(--amber); animation:pulse 1.2s infinite;}
  .dot.good{background:var(--teal);}
  .dot.poor{background:var(--danger);}
  @keyframes pulse{0%,100%{opacity:1;} 50%{opacity:0.3;}}

  .mapwrap{flex:1; position:relative; overflow:hidden; background:var(--bg);}
  #map{width:100%; height:100%; background:var(--bg);}
  .leaflet-container{font-family:var(--font-display); background:var(--bg);}

  .mapctrls{position:absolute; right:10px; top:10px; display:flex; flex-direction:column; gap:6px; z-index:500;}
  .mapctrls button{width:38px; height:38px; border-radius:6px; border:1px solid var(--border); background:rgba(30,45,39,0.92); color:var(--paper); font-family:var(--font-mono); font-size:16px; display:flex; align-items:center; justify-content:center;}
  .mapctrls button.active{background:var(--amber); color:#1a1408; border-color:var(--amber);}
  .legend-toggle{position:absolute; left:10px; top:10px; z-index:500;}
  .legend-toggle button{background:rgba(30,45,39,0.92); border:1px solid var(--border); color:var(--text-dim); font-family:var(--font-mono); font-size:9.5px; padding:7px 10px; border-radius:6px; letter-spacing:0.04em;}
  .legend-panel{position:absolute; left:10px; top:48px; z-index:500; background:rgba(20,30,26,0.96); border:1px solid var(--border); border-radius:6px; padding:8px 10px; font-family:var(--font-mono); font-size:9.5px; color:var(--text-dim); display:none; max-width:170px;}
  .legend-panel.open{display:block;}
  .legend-panel div{display:flex; align-items:center; gap:6px; margin:3px 0;}
  .legend-panel canvas{flex-shrink:0;}

  .pulse-dot{width:16px; height:16px; border-radius:50%; background:var(--teal); border:2px solid var(--paper); box-shadow:0 0 0 rgba(95,168,149,0.5); animation:radar 2s infinite;}
  @keyframes radar{0%{box-shadow:0 0 0 0 rgba(95,168,149,0.55);} 70%{box-shadow:0 0 0 16px rgba(95,168,149,0);} 100%{box-shadow:0 0 0 0 rgba(95,168,149,0);}}

  .leaflet-popup-content-wrapper{background:var(--bg-raised); color:var(--text); border-radius:8px;}
  .leaflet-popup-tip{background:var(--bg-raised);}
  .popup-num{font-weight:700; font-size:14px; margin-bottom:2px;}
  .popup-meta{font-family:var(--font-mono); font-size:10px; color:var(--text-dim); margin-bottom:8px;}
  .popup-del{background:var(--danger); color:#fff; border:none; padding:6px 10px; border-radius:5px; font-family:var(--font-mono); font-size:10px;}

  .actionbar{flex-shrink:0; padding:10px 14px calc(10px + env(safe-area-inset-bottom)); background:var(--bg-raised); border-top:1px solid var(--border); display:flex; gap:8px; z-index:10; position:relative;}
  .btn-mark{flex:1; background:var(--amber); color:#1a1408; border:none; border-radius:8px; font-family:var(--font-display); font-weight:700; font-size:14px; padding:14px 10px; text-transform:uppercase; letter-spacing:0.03em;}
  .btn-mark:active{background:#cf8b2e;}
  .btn-list, .btn-export{background:var(--bg); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:14px 14px; font-family:var(--font-mono); font-size:11px;}
  .btn-list:active, .btn-export:active{border-color:var(--amber);}

  .overlay{position:fixed; inset:0; background:rgba(10,15,13,0.85); z-index:2000; display:none; align-items:flex-end; justify-content:center;}
  .overlay.open{display:flex;}
  .sheet{background:var(--bg-raised); width:100%; max-width:480px; border-radius:14px 14px 0 0; padding:18px 18px calc(18px + env(safe-area-inset-bottom)); max-height:85vh; overflow-y:auto; border-top:1px solid var(--border);}
  .sheet h2{margin:0 0 4px; font-size:16px; text-transform:uppercase; letter-spacing:0.03em;}
  .sheet .sub{font-family:var(--font-mono); font-size:10px; color:var(--text-dim); margin-bottom:14px;}
  .symbol-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:14px;}
  .symbol-opt{background:var(--bg); border:1.5px solid var(--border); border-radius:8px; padding:10px 6px; display:flex; flex-direction:column; align-items:center; gap:6px; color:var(--text-dim);}
  .symbol-opt canvas{width:32px; height:32px;}
  .symbol-opt .lbl{font-family:var(--font-mono); font-size:8.5px; text-align:center; line-height:1.3; text-transform:uppercase;}
  .symbol-opt.selected{border-color:var(--amber); color:var(--paper); background:rgba(232,162,61,0.08);}
  .field{margin-bottom:12px;}
  .field label{display:block; font-family:var(--font-mono); font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:5px;}
  .field input, .field textarea{width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text); font-family:var(--font-display); font-size:14px; padding:10px; border-radius:6px;}
  .field input:focus, .field textarea:focus{outline:none; border-color:var(--amber);}
  .sheet-actions{display:flex; gap:8px; margin-top:6px;}
  .btn-save{flex:2; background:var(--amber); color:#1a1408; border:none; border-radius:8px; padding:13px; font-weight:700; font-family:var(--font-display); text-transform:uppercase; font-size:13px;}
  .btn-cancel{flex:1; background:transparent; border:1px solid var(--border); color:var(--text-dim); border-radius:8px; padding:13px; font-family:var(--font-display); font-size:13px;}
  .gps-readout{font-family:var(--font-mono); font-size:10px; color:var(--teal); margin-bottom:12px; padding:8px 10px; background:var(--bg); border-radius:6px; border:1px solid var(--border);}

  .point-row{display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--border);}
  .point-row canvas{width:24px; height:24px; flex-shrink:0;}
  .point-row .pinfo{flex:1; min-width:0;}
  .point-row .pnum{font-weight:700; font-size:14px;}
  .point-row .pmeta{font-family:var(--font-mono); font-size:9.5px; color:var(--text-dim); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .point-row .pdel{background:none; border:none; color:var(--danger); font-family:var(--font-mono); font-size:16px; padding:4px 8px;}
  .empty-state{text-align:center; padding:30px 10px; color:var(--text-dim); font-family:var(--font-mono); font-size:11px;}

  .toast{position:fixed; bottom:90px; left:50%; transform:translateX(-50%); background:var(--teal); color:#0d1a16; padding:9px 16px; border-radius:20px; font-family:var(--font-mono); font-size:11.5px; z-index:3000; opacity:0; pointer-events:none; transition:opacity 0.25s;}
  .toast.show{opacity:1;}
  .leaflet-control-attribution{background:rgba(20,30,26,0.8) !important; color:var(--text-dim) !important; font-size:8px !important;}
  .leaflet-control-attribution a{color:var(--teal) !important;}

  #printArea{display:none;}
  @media print{
    @page{ size: A3 portrait; margin: 10mm; }
    body *{ visibility:hidden; }
    #printArea, #printArea *{ visibility:visible; }
    #printArea{ display:block !important; position:absolute; top:0; left:0; width:100%; }
  }
</style>
</head>
<body>

<header>
  <div class="brand"><h1>HLB <span>Field Mapper</span></h1><div class="tagline">Census 2027 &middot; Satellite Mode</div></div>
  <div class="blockrow"><label>Block ID</label><input id="blockId" type="text" placeholder="e.g. Ward-14 / HLB-093" autocomplete="off"></div>
</header>

<div class="gpsbar">
  <div class="stat"><span class="k"><span class="dot acquiring" id="gpsDot"></span>Status</span><span class="v" id="gpsStatus">Acquiring…</span></div>
  <div class="stat"><span class="k">Accuracy</span><span class="v" id="gpsAcc">—</span></div>
  <div class="stat"><span class="k">Lat</span><span class="v" id="gpsLat">—</span></div>
  <div class="stat"><span class="k">Lng</span><span class="v" id="gpsLng">—</span></div>
  <div class="stat"><span class="k">Marked</span><span class="v" id="gpsCount">0</span></div>
</div>

<div class="mapwrap">
  <div id="map"></div>
  <div class="mapctrls">
    <button id="followBtn" class="active" title="Follow my location">&#9678;</button>
    <button id="layerBtn" title="Toggle satellite / street">&#9673;</button>
  </div>
  <div class="legend-toggle"><button id="legendToggle">LEGEND</button></div>
  <div class="legend-panel" id="legendPanel"></div>
</div>

<div class="actionbar">
  <button class="btn-list" id="openList">List</button>
  <button class="btn-mark" id="markHere">+ Mark Building Here</button>
  <button class="btn-export" id="openExport">Export</button>
</div>

<div class="overlay" id="markOverlay"><div class="sheet">
  <h2>Mark this location</h2>
  <div class="sub">Point is fixed to your current GPS position</div>
  <div class="gps-readout" id="markGpsReadout">Waiting for fix…</div>
  <div class="field"><label>Symbol type</label><div class="symbol-grid" id="symbolGrid"></div></div>
  <div class="field"><label>Building / House number</label><input id="buildingNumber" type="text" placeholder="e.g. 619 or 619/1"></div>
  <div class="field"><label>Notes (optional)</label><textarea id="buildingNote" rows="2" placeholder="e.g. owner name, landmark name"></textarea></div>
  <div class="sheet-actions"><button class="btn-cancel" id="cancelMark">Cancel</button><button class="btn-save" id="saveMark">Save Point</button></div>
</div></div>

<div class="overlay" id="listOverlay"><div class="sheet">
  <h2>Marked points</h2>
  <div class="sub" id="listSub">0 points in this block</div>
  <div id="pointList"></div>
  <div class="sheet-actions"><button class="btn-cancel" id="closeList">Close</button></div>
</div></div>

<div class="overlay" id="exportOverlay"><div class="sheet">
  <h2>Export block data</h2>
  <div class="sub">Files download to your device</div>
  <div class="sheet-actions" style="flex-direction:column;">
    <button class="btn-save" id="exportCsv" style="margin-bottom:8px;">Download CSV</button>
    <button class="btn-save" id="exportKml" style="margin-bottom:8px; background:var(--teal);">Download KML</button>
    <button class="btn-save" id="exportPrint" style="margin-bottom:8px; background:var(--paper); color:#1a1408;">Print / Save as PDF (A3)</button>
    <button class="btn-cancel" id="closeExport">Close</button>
  </div>
</div></div>

<div class="toast" id="toast"></div>
<div id="printArea"></div>

<script>
/* ================= Symbols (matches official HLB legend) ================= */
const SYMBOLS = [
  {id:'pucca_res',    label:'Pucca · Residential',     draw:drawSquare,   hatch:false, color:'#eae6d9'},
  {id:'pucca_nonres', label:'Pucca · Non-residential',  draw:drawSquare,   hatch:true,  color:'#eae6d9'},
  {id:'kutcha_res',   label:'Kutcha · Residential',     draw:drawTriangle, hatch:false, color:'#eae6d9'},
  {id:'kutcha_nonres',label:'Kutcha · Non-residential', draw:drawTriangle, hatch:true,  color:'#eae6d9'},
  {id:'well',         label:'Well / Handpump',          draw:drawWell,     hatch:false, color:'#eae6d9'},
  {id:'landmark',     label:'Landmark (temple/school)', draw:drawLandmark, hatch:false, color:'#eae6d9'},
];
function drawSquare(ctx,cx,cy,s,hatch,color){
  ctx.strokeStyle=color; ctx.lineWidth=Math.max(1.4,s*0.07);
  ctx.strokeRect(cx-s/2,cy-s/2,s,s);
  if(hatch){ ctx.save(); ctx.beginPath(); ctx.rect(cx-s/2,cy-s/2,s,s); ctx.clip();
    ctx.beginPath(); for(let i=-s;i<=s;i+=s/4){ ctx.moveTo(cx-s/2+i,cy-s/2); ctx.lineTo(cx-s/2+i+s,cy+s/2);} ctx.strokeStyle=color; ctx.lineWidth=Math.max(0.9,s*0.04); ctx.stroke(); ctx.restore(); }
}
function drawTriangle(ctx,cx,cy,s,hatch,color){
  const h=s*0.9; ctx.strokeStyle=color; ctx.lineWidth=Math.max(1.4,s*0.07);
  ctx.beginPath(); ctx.moveTo(cx,cy-h/1.6); ctx.lineTo(cx+s/1.7,cy+h/2.2); ctx.lineTo(cx-s/1.7,cy+h/2.2); ctx.closePath(); ctx.stroke();
  if(hatch){ ctx.save(); ctx.clip(); ctx.beginPath(); for(let i=-s;i<=s;i+=s/4){ ctx.moveTo(cx-s+i,cy-h/1.6); ctx.lineTo(cx-s+i+h,cy+h/2.2);} ctx.strokeStyle=color; ctx.lineWidth=Math.max(0.9,s*0.04); ctx.stroke(); ctx.restore(); }
}
function drawWell(ctx,cx,cy,s,hatch,color){
  ctx.strokeStyle=color; ctx.lineWidth=Math.max(1.4,s*0.08);
  ctx.beginPath(); ctx.arc(cx,cy,s/2.3,0,Math.PI*2); ctx.stroke();
  ctx.fillStyle=color; ctx.beginPath(); ctx.arc(cx,cy,s*0.1,0,Math.PI*2); ctx.fill();
}
function drawLandmark(ctx,cx,cy,s,hatch,color){
  ctx.strokeStyle=color; ctx.lineWidth=Math.max(1.4,s*0.08);
  ctx.beginPath(); ctx.moveTo(cx,cy-s/1.8); ctx.lineTo(cx+s/1.8,cy); ctx.lineTo(cx,cy+s/1.8); ctx.lineTo(cx-s/1.8,cy); ctx.closePath(); ctx.stroke();
}
function symbolToDataUrl(sym, size, color){
  const c = document.createElement('canvas'); c.width=size; c.height=size;
  const cctx = c.getContext('2d');
  sym.draw(cctx, size/2, size/2, size*0.75, sym.hatch, color);
  return c.toDataURL();
}

/* ================= State ================= */
let blockId='', points=[], currentPos=null, selectedSymbol=SYMBOLS[0].id, followMode=true, usingSatellite=true;
let map, liveMarker, accCircle, trailLine, trailCoords=[], pointMarkers={};

/* ================= Map init (free basemaps, no API key) ================= */
const esriSat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  maxZoom:20, attribution:'Esri, Maxar, Earthstar Geographics'
});
const esriLabels = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', {
  maxZoom:20, attribution:''
});
const osmStreet = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom:19, attribution:'&copy; OpenStreetMap contributors'
});

map = L.map('map', {zoomControl:false, attributionControl:true, layers:[esriSat, esriLabels]}).setView([10.0, 76.3], 17);
L.control.zoom({position:'bottomright'}).remove(); // custom controls used instead
L.control.scale({position:'bottomleft', metric:true, imperial:false}).addTo(map);

document.getElementById('layerBtn').onclick = ()=>{
  usingSatellite = !usingSatellite;
  if(usingSatellite){ map.removeLayer(osmStreet); map.addLayer(esriSat); map.addLayer(esriLabels); showToast('Satellite view'); }
  else { map.removeLayer(esriSat); map.removeLayer(esriLabels); map.addLayer(osmStreet); showToast('Street view'); }
};

document.getElementById('followBtn').onclick = (e)=>{
  followMode = !followMode;
  e.currentTarget.classList.toggle('active', followMode);
  if(followMode && currentPos) map.panTo([currentPos.lat, currentPos.lng]);
};
map.on('dragstart', ()=>{ followMode=false; document.getElementById('followBtn').classList.remove('active'); });

/* live position icon */
const liveIcon = L.divIcon({className:'', html:'<div class="pulse-dot"></div>', iconSize:[16,16], iconAnchor:[8,8]});

/* ================= Storage ================= */
async function loadBlock(id){
  points=[]; clearMarkers();
  trailCoords=[]; if(trailLine){ map.removeLayer(trailLine); trailLine=null; }
  try{
    const res = await window.storage.get('hlb:'+id);
    if(res && res.value){
      const data = JSON.parse(res.value);
      points = data.points || [];
      trailCoords = data.trail || [];
    }
  }catch(e){}
  points.forEach(addMarkerForPoint);
  if(trailCoords.length>1){ trailLine = L.polyline(trailCoords,{color:'#e8a23d', weight:2, opacity:0.55}).addTo(map); }
  updateGpsCount();
  fitToPoints();
}
async function saveBlock(){
  if(!blockId) return;
  try{ await window.storage.set('hlb:'+blockId, JSON.stringify({points, trail:trailCoords})); }catch(e){ showToast('Save failed'); }
}
let lastSavedTrailLen = 0;
setInterval(()=>{
  if(blockId && trailCoords.length !== lastSavedTrailLen){
    lastSavedTrailLen = trailCoords.length;
    saveBlock();
  }
}, 15000);
function clearMarkers(){ Object.values(pointMarkers).forEach(m=>map.removeLayer(m)); pointMarkers={}; }
function fitToPoints(){
  if(points.length===0) return;
  const bounds = L.latLngBounds(points.map(p=>[p.lat,p.lng]));
  map.fitBounds(bounds.pad(0.3));
}

/* ================= GPS ================= */
function startGps(){
  if(!navigator.geolocation){ document.getElementById('gpsStatus').textContent='Not supported'; return; }
  navigator.geolocation.watchPosition(onPos, onGpsError, {enableHighAccuracy:true, maximumAge:1000, timeout:15000});
}
function onGpsError(err){
  document.getElementById('gpsDot').className='dot poor';
  document.getElementById('gpsStatus').textContent = err.code===1 ? 'Permission denied' : 'Signal lost';
}
let firstFix = true;
function onPos(pos){
  const {latitude:lat, longitude:lng, accuracy:acc} = pos.coords;
  currentPos = {lat,lng,acc};
  const dot=document.getElementById('gpsDot'), status=document.getElementById('gpsStatus');
  if(acc<=8){dot.className='dot good'; status.textContent='Good fix';}
  else if(acc<=20){dot.className='dot good'; status.textContent='Fair fix';}
  else {dot.className='dot acquiring'; status.textContent='Weak fix';}
  document.getElementById('gpsAcc').textContent='±'+acc.toFixed(1)+'m';
  document.getElementById('gpsLat').textContent=lat.toFixed(6);
  document.getElementById('gpsLng').textContent=lng.toFixed(6);

  const latlng=[lat,lng];
  if(!liveMarker){ liveMarker=L.marker(latlng,{icon:liveIcon,zIndexOffset:1000}).addTo(map); }
  else liveMarker.setLatLng(latlng);
  if(!accCircle){ accCircle=L.circle(latlng,{radius:acc, color:'#5fa895', weight:1, fillOpacity:0.08}).addTo(map); }
  else { accCircle.setLatLng(latlng); accCircle.setRadius(acc); }

  const last = trailCoords[trailCoords.length-1];
  if(!last || map.distance(last, latlng) > 1.5){
    trailCoords.push(latlng);
    if(trailCoords.length>1000) trailCoords.shift();
    if(!trailLine) trailLine = L.polyline(trailCoords,{color:'#e8a23d', weight:2, opacity:0.55}).addTo(map);
    else trailLine.setLatLngs(trailCoords);
  }
  if(firstFix){ map.setView(latlng, 19); firstFix=false; }
  else if(followMode){ map.panTo(latlng); }
}

function updateGpsCount(){ document.getElementById('gpsCount').textContent = points.length; }

/* ================= Legend ================= */
const legendPanel = document.getElementById('legendPanel');
legendPanel.innerHTML = SYMBOLS.map(s=>`<div><canvas width="24" height="24" data-sym="${s.id}"></canvas>${s.label}</div>`).join('');
document.getElementById('legendToggle').onclick=()=> legendPanel.classList.toggle('open');
legendPanel.querySelectorAll('canvas').forEach(c=>{ const sym=SYMBOLS.find(s=>s.id===c.dataset.sym); sym.draw(c.getContext('2d'),12,12,15,sym.hatch,'#eae6d9'); });

/* ================= Symbol picker ================= */
const symbolGrid = document.getElementById('symbolGrid');
function renderSymbolGrid(){
  symbolGrid.innerHTML='';
  SYMBOLS.forEach(sym=>{
    const opt=document.createElement('div');
    opt.className='symbol-opt'+(sym.id===selectedSymbol?' selected':'');
    opt.innerHTML=`<canvas width="64" height="64"></canvas><div class="lbl">${sym.label}</div>`;
    opt.onclick=()=>{ selectedSymbol=sym.id; renderSymbolGrid(); };
    symbolGrid.appendChild(opt);
    const c=opt.querySelector('canvas'); sym.draw(c.getContext('2d'),32,32,30,sym.hatch, sym.id===selectedSymbol?'#e8a23d':'#93a39a');
  });
}
renderSymbolGrid();

/* ================= Add / render point markers ================= */
function addMarkerForPoint(pt){
  const sym = SYMBOLS.find(s=>s.id===pt.type)||SYMBOLS[0];
  const icon = L.icon({iconUrl: symbolToDataUrl(sym,44,'#eae6d9'), iconSize:[28,28], iconAnchor:[14,14]});
  const m = L.marker([pt.lat,pt.lng], {icon}).addTo(map);
  m.bindPopup(`<div class="popup-num">${pt.number}</div><div class="popup-meta">${sym.label}${pt.note?(' · '+pt.note):''}</div><button class="popup-del" data-id="${pt.id}">Delete point</button>`);
  m.on('popupopen', (e)=>{
    e.popup.getElement().querySelector('.popup-del').onclick = ()=>{
      points = points.filter(p=>p.id!==pt.id);
      map.removeLayer(m); delete pointMarkers[pt.id];
      saveBlock(); updateGpsCount(); showToast('Point removed');
    };
  });
  pointMarkers[pt.id]=m;
}

/* ================= Mark modal ================= */
document.getElementById('markHere').onclick=()=>{
  if(!blockId){ showToast('Enter a Block ID first'); return; }
  if(!currentPos){ showToast('Waiting for GPS fix…'); return; }
  document.getElementById('markGpsReadout').textContent = `${currentPos.lat.toFixed(6)}, ${currentPos.lng.toFixed(6)}  ·  ±${currentPos.acc.toFixed(1)}m`;
  document.getElementById('buildingNumber').value=''; document.getElementById('buildingNote').value='';
  document.getElementById('markOverlay').classList.add('open');
};
document.getElementById('cancelMark').onclick=()=>document.getElementById('markOverlay').classList.remove('open');
document.getElementById('saveMark').onclick=()=>{
  const number=document.getElementById('buildingNumber').value.trim();
  if(!number){ showToast('Enter a building number'); return; }
  const pt = {id:Date.now()+'-'+Math.random().toString(36).slice(2,7), type:selectedSymbol, number,
    note:document.getElementById('buildingNote').value.trim(), lat:currentPos.lat, lng:currentPos.lng, acc:currentPos.acc, t:new Date().toISOString()};
  points.push(pt); addMarkerForPoint(pt); saveBlock(); updateGpsCount();
  document.getElementById('markOverlay').classList.remove('open');
  showToast('Point saved');
};

/* ================= List ================= */
document.getElementById('openList').onclick=()=>{ renderList(); document.getElementById('listOverlay').classList.add('open'); };
document.getElementById('closeList').onclick=()=>document.getElementById('listOverlay').classList.remove('open');
function renderList(){
  const container=document.getElementById('pointList');
  document.getElementById('listSub').textContent = points.length+' point'+(points.length!==1?'s':'')+' in this block';
  if(points.length===0){ container.innerHTML='<div class="empty-state">No points yet.<br>Walk to a building and tap "Mark Building Here".</div>'; return; }
  container.innerHTML='';
  [...points].sort((a,b)=>a.number.localeCompare(b.number,undefined,{numeric:true})).forEach(pt=>{
    const sym=SYMBOLS.find(s=>s.id===pt.type)||SYMBOLS[0];
    const row=document.createElement('div'); row.className='point-row';
    row.innerHTML=`<canvas width="48" height="48"></canvas><div class="pinfo"><div class="pnum">${pt.number}</div><div class="pmeta">${sym.label} &middot; ${pt.lat.toFixed(5)}, ${pt.lng.toFixed(5)}</div></div><button class="pdel">&times;</button>`;
    sym.draw(row.querySelector('canvas').getContext('2d'),24,24,20,sym.hatch,'#eae6d9');
    row.querySelector('.pdel').onclick=()=>{
      points=points.filter(p=>p.id!==pt.id);
      if(pointMarkers[pt.id]){ map.removeLayer(pointMarkers[pt.id]); delete pointMarkers[pt.id]; }
      saveBlock(); updateGpsCount(); renderList(); showToast('Point removed');
    };
    row.addEventListener('click', (e)=>{ if(e.target.classList.contains('pdel')) return; map.panTo([pt.lat,pt.lng]); document.getElementById('listOverlay').classList.remove('open'); });
    container.appendChild(row);
  });
}

/* ================= Export ================= */
document.getElementById('openExport').onclick=()=>document.getElementById('exportOverlay').classList.add('open');
document.getElementById('closeExport').onclick=()=>document.getElementById('exportOverlay').classList.remove('open');
function download(filename, content, mime){
  const blob=new Blob([content],{type:mime}); const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=filename; a.click(); URL.revokeObjectURL(url);
}
document.getElementById('exportCsv').onclick=()=>{
  if(points.length===0){ showToast('No points to export'); return; }
  let csv='building_number,type,latitude,longitude,accuracy_m,timestamp,note\n';
  points.forEach(p=>{ csv+=`"${p.number}","${p.type}",${p.lat},${p.lng},${p.acc||''},"${p.t}","${(p.note||'').replace(/"/g,"'")}"\n`; });
  download((blockId||'hlb')+'_points.csv', csv, 'text/csv');
};
document.getElementById('exportKml').onclick=()=>{
  if(points.length===0){ showToast('No points to export'); return; }
  let kml=`<?xml version="1.0" encoding="UTF-8"?><kml xmlns="http://www.opengis.net/kml/2.2"><Document><name>${blockId||'HLB'}</name>`;
  points.forEach(p=>{ const sym=SYMBOLS.find(s=>s.id===p.type); kml+=`<Placemark><name>${p.number}</name><description>${sym?sym.label:''} ${p.note?('- '+p.note):''}</description><Point><coordinates>${p.lng},${p.lat},0</coordinates></Point></Placemark>`; });
  kml+='</Document></kml>';
  download((blockId||'hlb')+'_points.kml', kml, 'application/vnd.google-earth.kml+xml');
};

/* ================= Print / PDF (outline + markings only, no satellite) ================= */
document.getElementById('exportPrint').onclick = ()=>{
  if(points.length===0 && trailCoords.length===0){ showToast('Nothing to print yet'); return; }
  buildPrintView();
  document.getElementById('exportOverlay').classList.remove('open');
  setTimeout(()=> window.print(), 150);
};
window.addEventListener('afterprint', ()=>{ document.getElementById('printArea').style.display='none'; });

function buildPrintView(){
  const PAGE_W = 297, PAGE_H = 420; // A3 portrait, mm
  const MARGIN = 10;
  const HEADER_H = 26, LEGEND_H = 34;
  const drawW = PAGE_W - MARGIN*2;
  const drawH = PAGE_H - MARGIN*2 - HEADER_H - LEGEND_H;

  // reference origin = first available coordinate
  const ref = (points[0] || trailCoords[0]);
  if(!ref) return;
  const refLat = Array.isArray(ref) ? ref[0] : ref.lat;
  const refLng = Array.isArray(ref) ? ref[1] : ref.lng;
  const R = 6378137;
  function toM(lat,lng){
    const dLat=(lat-refLat)*Math.PI/180, dLng=(lng-refLng)*Math.PI/180;
    return { x: dLng*Math.cos(refLat*Math.PI/180)*R, y: -(dLat*R) };
  }
  const trailM = trailCoords.map(c=>toM(c[0],c[1]));
  const pointsM = points.map(p=>({...p, m:toM(p.lat,p.lng)}));
  const all = trailM.concat(pointsM.map(p=>p.m));
  const xs = all.map(p=>p.x), ys = all.map(p=>p.y);
  const minX=Math.min(...xs), maxX=Math.max(...xs), minY=Math.min(...ys), maxY=Math.max(...ys);
  const spanX = Math.max(maxX-minX, 10), spanY = Math.max(maxY-minY, 10);
  const pad = 1.15;
  const mPerMm = Math.max(spanX*pad/drawW, spanY*pad/drawH);
  const cx = (minX+maxX)/2, cy=(minY+maxY)/2;
  function toPx(m){ return { x: drawW/2 + (m.x-cx)/mPerMm, y: drawH/2 + (m.y-cy)/mPerMm }; }

  let svgBody = '';
  // outline path from walked trail
  if(trailM.length>1){
    const pts = trailM.map(m=>{ const p=toPx(m); return `${p.x.toFixed(2)},${p.y.toFixed(2)}`; }).join(' ');
    svgBody += `<polyline points="${pts}" fill="none" stroke="#000" stroke-width="0.5" stroke-dasharray="2,1.4"/>`;
  }
  // symbols
  pointsM.forEach(p=>{
    const s = toPx(p.m);
    svgBody += svgSymbol(p.type, s.x, s.y, 7);
    svgBody += `<text x="${s.x.toFixed(2)}" y="${(s.y+11).toFixed(2)}" font-size="3.2" font-family="monospace" text-anchor="middle">${escapeXml(p.number)}</text>`;
  });
  // north arrow
  svgBody += `<g transform="translate(${drawW-14},14)">
    <polygon points="0,-7 3,4 0,1.5 -3,4" fill="#000"/>
    <text x="0" y="12" font-size="4" text-anchor="middle" font-family="sans-serif" font-weight="bold">N</text>
  </g>`;
  // scale bar
  const barMm = 40;
  const barMeters = niceScaleMm(barMm*mPerMm);
  const barPx = barMeters/mPerMm;
  svgBody += `<g transform="translate(4,${drawH-8})">
    <line x1="0" y1="0" x2="${barPx.toFixed(1)}" y2="0" stroke="#000" stroke-width="0.6"/>
    <line x1="0" y1="-1.5" x2="0" y2="1.5" stroke="#000" stroke-width="0.6"/>
    <line x1="${barPx.toFixed(1)}" y1="-1.5" x2="${barPx.toFixed(1)}" y2="1.5" stroke="#000" stroke-width="0.6"/>
    <text x="0" y="-3" font-size="3" font-family="monospace">${barMeters} m</text>
  </g>`;

  const legendItems = SYMBOLS.map((sym,i)=>{
    const lx = 6 + (i%3)*(drawW/3), ly = 8 + Math.floor(i/3)*13;
    return `<g transform="translate(${lx},${ly})">${svgSymbolInline(sym,5)}<text x="10" y="1.8" font-size="3" font-family="monospace">${escapeXml(sym.label)}</text></g>`;
  }).join('');

  const html = `
    <div style="width:${PAGE_W}mm; padding:${MARGIN}mm; font-family:sans-serif; box-sizing:border-box;">
      <div style="height:${HEADER_H}mm; border-bottom:0.5pt solid #000; margin-bottom:2mm; display:flex; justify-content:space-between; align-items:flex-end;">
        <div>
          <div style="font-size:14pt; font-weight:700;">Houselisting Block — Layout Map</div>
          <div style="font-size:8pt; font-family:monospace;">Block ID: ${escapeXml(blockId||'—')} &nbsp;&nbsp; Buildings marked: ${points.length}</div>
        </div>
        <div style="font-size:8pt; font-family:monospace; text-align:right;">Generated ${new Date().toLocaleDateString()}<br>Census 2027 · HLB Field Mapper</div>
      </div>
      <svg width="${drawW}mm" height="${drawH}mm" viewBox="0 0 ${drawW} ${drawH}" style="border:0.5pt solid #000;">
        ${svgBody}
      </svg>
      <div style="height:${LEGEND_H}mm; margin-top:2mm; border-top:0.5pt solid #000; padding-top:2mm;">
        <svg width="${drawW}mm" height="${LEGEND_H-4}mm" viewBox="0 0 ${drawW} ${LEGEND_H-4}">${legendItems}</svg>
      </div>
    </div>`;
  document.getElementById('printArea').innerHTML = html;
}
function escapeXml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function niceScaleMm(rough){ const steps=[1,2,5,10,20,50,100,200,500,1000,2000,5000]; return steps.reduce((a,b)=>Math.abs(b-rough)<Math.abs(a-rough)?b:a); }
function svgSymbol(type, cx, cy, s){
  const black='#000';
  if(type==='pucca_res') return `<rect x="${cx-s/2}" y="${cy-s/2}" width="${s}" height="${s}" fill="none" stroke="${black}" stroke-width="0.5"/>`;
  if(type==='pucca_nonres') return `<rect x="${cx-s/2}" y="${cy-s/2}" width="${s}" height="${s}" fill="none" stroke="${black}" stroke-width="0.5"/>` + hatchLines(cx-s/2,cy-s/2,s,s);
  if(type==='kutcha_res') return `<polygon points="${cx},${cy-s*0.55} ${cx+s*0.55},${cy+s*0.4} ${cx-s*0.55},${cy+s*0.4}" fill="none" stroke="${black}" stroke-width="0.5"/>`;
  if(type==='kutcha_nonres') return `<polygon points="${cx},${cy-s*0.55} ${cx+s*0.55},${cy+s*0.4} ${cx-s*0.55},${cy+s*0.4}" fill="none" stroke="${black}" stroke-width="0.5"/>` + hatchLines(cx-s/2,cy-s*0.2,s,s*0.5);
  if(type==='well') return `<circle cx="${cx}" cy="${cy}" r="${s/2.3}" fill="none" stroke="${black}" stroke-width="0.5"/><circle cx="${cx}" cy="${cy}" r="0.6" fill="${black}"/>`;
  if(type==='landmark') return `<polygon points="${cx},${cy-s/1.8} ${cx+s/1.8},${cy} ${cx},${cy+s/1.8} ${cx-s/1.8},${cy}" fill="none" stroke="${black}" stroke-width="0.5"/>`;
  return '';
}
function svgSymbolInline(sym, s){ return svgSymbol(sym.id, s/2+1, s/2+1, s); }
function hatchLines(x,y,w,h){
  let l='';
  for(let i=0;i<=w+h;i+=w/3){ l+=`<line x1="${x+Math.max(0,i-h)}" y1="${y+Math.min(i,h)}" x2="${x+Math.min(i,w)}" y2="${y+Math.max(0,i-w)}" stroke="#000" stroke-width="0.3"/>`; }
  return `<g clip-path="url(#clip)">${l}</g>`;
}

/* ================= Toast ================= */
let toastTimer;
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2000); }

/* ================= Block handling ================= */
const blockInput=document.getElementById('blockId');
blockInput.addEventListener('change', async ()=>{
  blockId=blockInput.value.trim();
  if(blockId){ await loadBlock(blockId); try{ await window.storage.set('hlb:lastBlock', blockId); }catch(e){} showToast('Loaded block: '+blockId); }
});

/* ================= Init ================= */
(async function init(){
  try{
    const last = await window.storage.get('hlb:lastBlock');
    if(last && last.value){ blockInput.value=last.value; blockId=last.value; await loadBlock(blockId); }
  }catch(e){}
  startGps();
})();
</script>
</body>
</html>
